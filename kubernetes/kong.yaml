apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: andreistan26/kong:latest
          ports:
            - containerPort: 8000
            - containerPort: 8001
            - containerPort: 8022
---
apiVersion: v1
kind: Service
metadata:
  name: kong
spec:
  type: NodePort
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000 
      targetPort: 8000
      nodePort: 30080
    - name: admin
      port: 8001 
      targetPort: 8001
      nodePort: 30081
    - name: testing
      port: 8022
      targetPort: 8022
      nodePort: 30022

